<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>珈百璃的权限管理工坊</title>
    <!-- 引入优秀的 CDN 和美观字体 -->
    <link href="https://cdn.jsdelivr.net/npm/bootswatch@5.3.3/dist/litera/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body { 
            padding-top: 30px; 
            background: linear-gradient(135deg, #fff5f7 0%, #f3f0ff 100%); 
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        /* 顶部看板二次元粉嫩风格美化 */
        .anime-header {
            background: linear-gradient(135deg, #ff8ba7 0%, #c3a6ff 100%);
            border-radius: 20px;
            color: white;
            box-shadow: 0 8px 32px rgba(255, 139, 167, 0.25);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }
        
        .anime-header::after {
            content: "Gabriel's Workshop";
            position: absolute;
            right: -20px;
            bottom: -20px;
            font-size: 5rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.08);
            transform: rotate(-10deg);
            pointer-events: none;
        }

        .plugin-logo { 
            width: 46px; 
            height: 46px; 
            object-fit: cover; 
            border-radius: 12px; 
            box-shadow: 0 4px 8px rgba(255, 139, 167, 0.15); 
            border: 2px solid #fff; 
        }
        
        .logo-placeholder { 
            width: 46px; 
            height: 46px; 
            border-radius: 12px; 
            background: linear-gradient(135deg, #ff8ba7, #c3a6ff); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: white; 
            font-weight: bold; 
            box-shadow: 0 4px 8px rgba(255, 139, 167, 0.15); 
            border: 2px solid #fff;
            font-size: 1.2rem;
        }
        
        /* 卡片圆角及柔和阴影 */
        .card {
            border: none;
            border-radius: 18px !important;
            box-shadow: 0 6px 24px rgba(255, 139, 167, 0.06);
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        
        .plugin-card { 
            transition: transform 0.25s, box-shadow 0.25s; 
            border-radius: 12px;
        }
        
        .plugin-card:hover { 
            transform: translateY(-3px) scale(1.01); 
            box-shadow: 0 8px 24px rgba(255, 139, 167, 0.12);
            background-color: #fffafc;
        }
        
        /* 甜美粉色调按钮 */
        .btn-primary {
            background: linear-gradient(135deg, #ff8ba7 0%, #ff7096 100%);
            border: none;
            box-shadow: 0 4px 12px rgba(255, 139, 167, 0.2);
            border-radius: 12px;
            font-weight: 600;
        }
        
        .btn-primary:hover, .btn-primary:active {
            background: linear-gradient(135deg, #ff7096 0%, #ff527b 100%) !important;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(255, 139, 167, 0.3);
        }
        
        .btn-outline-secondary {
            border-color: #ff8ba7;
            color: #ff7096;
            border-radius: 12px;
            font-weight: 500;
            background-color: transparent;
        }
        
        .btn-outline-secondary:hover {
            background-color: #ff8ba7;
            border-color: #ff8ba7;
            color: #fff;
        }

        .search-area { 
            border-radius: 14px; 
            border: 2px solid #ffccd5; 
            transition: all 0.25s; 
            overflow: hidden;
            background-color: white;
        }
        
        .search-area:focus-within { 
            border-color: #ff8ba7; 
            box-shadow: 0 0 0 0.25rem rgba(255, 139, 167, 0.2); 
        }
        
        .breadcrumb-item a { 
            text-decoration: none; 
            color: #ff7096; 
            font-weight: 600; 
        }
        
        .table th { 
            font-weight: bold; 
            font-size: 0.85rem; 
            color: #8c7b83; 
            border-bottom: 2px solid #ffccd5;
        }
        
        .table td { 
            vertical-align: middle; 
        }
        
        /* 彩色二次元徽章 */
        .badge-cmd { 
            background-color: rgba(255, 139, 167, 0.15); 
            color: #ff527b; 
            border: 1px solid rgba(255, 139, 167, 0.25); 
            font-weight: bold; 
            border-radius: 6px;
        }
        
        .badge-grp { 
            background-color: rgba(195, 166, 255, 0.15); 
            color: #8a57ff; 
            border: 1px solid rgba(195, 166, 255, 0.25); 
            font-weight: bold; 
            border-radius: 6px;
        }
        
        .form-select-sm {
            border: 2px solid #ffe3e8;
            transition: border-color 0.2s;
        }
        
        .form-select-sm:focus {
            border-color: #ff8ba7;
            box-shadow: 0 0 0 0.2rem rgba(255, 139, 167, 0.15);
        }
    
        /* 选项卡按钮 */
        .nav-pills .nav-link.active {
            background: linear-gradient(135deg, #ff8ba7 0%, #c3a6ff 100%) !important;
            color: white !important;
            box-shadow: 0 4px 12px rgba(255, 139, 167, 0.25);
        }
        .nav-pills .nav-link:not(.active) {
            color: #6c757d !important;
        }
        .nav-pills .nav-link:not(.active):hover {
            background-color: #ffeef2 !important;
            color: #ff7096 !important;
        }
        .tool-type-badge {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            white-space: nowrap;
        }
        .badge-builtin { background-color: #e9ecef; color: #495057; }
        .badge-plugin { background-color: #fff0f3; color: #ff4d6d; }
        .badge-mcp { background-color: #f3f0ff; color: #7048e8; }
</style>
  </head>
  <body>
    <div class="container pb-5">
        <div id="app">
            <!-- 视图切换：列表页 -->
            <div id="view-list">
                <div class="p-4 mb-4 anime-header d-flex justify-content-between align-items-center">
                    <div>
                        <h1 class="h3 fw-bold mb-1"><i class="fas fa-magic me-2"></i> 珈百璃的权限管理工坊</h1>
                        <p class="mb-0 opacity-90">轻松配置所有插件的指令权限，为您的服务器安全保驾护航~</p>
                    </div>
                </div>

                <!-- 选项卡导航 -->
                <ul class="nav nav-pills mb-4 gap-2 p-1 bg-white rounded-pill shadow-sm border" style="max-width: fit-content;">
                    <li class="nav-item">
                        <button class="nav-link active rounded-pill px-4" id="tab-btn-commands" onclick="switchTab('commands')"><i class="fas fa-terminal me-2"></i> 指令权限管理</button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-link rounded-pill px-4" id="tab-btn-tools" onclick="switchTab('tools')"><i class="fas fa-screwdriver-wrench me-2"></i> 函数工具管理</button>
                    </li>
                </ul>


                <!-- 搜索组件 -->
                <div class="card shadow-sm mb-4" id="commands-search-input-card">
                    <div class="card-body p-3">
                        <div class="input-group search-area">
                            <span class="input-group-text bg-white border-0"><i class="fas fa-search" style="color:#ff8ba7;"></i></span>
                            <input type="text" class="form-control border-0" id="global-search" placeholder="输入插件名称、具体指令名或别名进行全局检索...">
                            <button class="btn btn-outline-secondary border-0" type="button" onclick="clearSearch()"><i class="fas fa-times text-muted"></i></button>
                        </div>
                    </div>
                </div>

                <!-- 📌 全局指令搜索结果区域 -->
                <div id="command-search-card" class="card shadow-sm mb-4" style="display: none; border: 2px dashed #ff8ba7;">
                    <div class="card-header bg-white py-3 border-bottom d-flex justify-content-between align-items-center">
                        <h5 class="mb-0 text-primary fw-bold"><i class="fas fa-terminal me-2" style="color:#ff7096;"></i> 搜索到的相关指令</h5>
                        <span class="badge bg-danger rounded-pill" id="search-count-badge">0 个结果</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">指令名称 / 归属插件</th>
                                        <th>权限限制</th>
                                        <th class="text-end pe-4">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="search-commands-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- 插件列表展示 -->
                <div class="card shadow-sm" id="plugins-list-card">
                    <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center border-bottom">
                        <h5 class="mb-0 fw-bold" style="color: #2b3e50;"><i class="fas fa-cubes text-muted me-2"></i> 核心及外部插件</h5>
                        <span class="badge rounded-pill" style="background-color: #ff8ba7; color: white;" id="plugin-count-badge">0 个插件</span>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4" style="width: 70px;">图标</th>
                                        <th>插件基本信息</th>
                                        <th>指令数</th>
                                        <th class="text-end pe-4">操作</th>
                                    </tr>
                                </thead>
                                <tbody id="plugins-tbody">
                                    <tr>
                                        <td colspan="4" class="text-center py-5">
                                            <div class="spinner-border text-primary" role="status"></div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            
                <!-- 函数工具管理面板 -->
                <div id="tools-card" style="display: none;">
                    <!-- 工具搜索组件 -->
                    <div class="card shadow-sm mb-4">
                        <div class="card-body p-3">
                            <div class="input-group search-area">
                                <span class="input-group-text bg-white border-0"><i class="fas fa-search" style="color:#c3a6ff;"></i></span>
                                <input type="text" class="form-control border-0" id="tool-search" placeholder="输入工具名称或描述进行检索..." oninput="filterTools()">
                                <button class="btn btn-outline-secondary border-0" type="button" onclick="clearToolSearch()"><i class="fas fa-times text-muted"></i></button>
                            </div>
                        </div>
                    </div>

                    <!-- 工具列表展示 -->
                    <div class="card shadow-sm">
                        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center border-bottom">
                            <h5 class="mb-0 fw-bold" style="color: #2b3e50;"><i class="fas fa-screwdriver-wrench text-muted me-2"></i> 已加载的函数工具 (Tools)</h5>
                            <span class="badge rounded-pill" style="background-color: #c3a6ff; color: white;" id="tool-count-badge">0 个工具</span>
                        </div>
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-hover mb-0 align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th class="ps-4">工具名称 / 描述</th>
                                            <th>工具类型</th>
                                            <th class="text-end pe-4" style="width: 150px;">状态控制</th>
                                        </tr>
                                    </thead>
                                    <tbody id="tools-tbody">
                                        <tr>
                                            <td colspan="3" class="text-center py-5">
                                                <div class="spinner-border text-primary" role="status"></div>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 视图切换：详情页 -->
            <div id="view-detail" style="display: none;">
                <nav aria-label="breadcrumb" class="mb-4">
                    <ol class="breadcrumb">
                        <li class="breadcrumb-item"><a href="#" onclick="showListView()"><i class="fas fa-chevron-left me-1"></i> 返回插件列表</a></li>
                        <li class="breadcrumb-item active" id="breadcrumb-plugin-name">指令详情</li>
                    </ol>
                </nav>

                <div class="d-flex justify-content-between align-items-center mb-4 bg-white p-3 rounded shadow-sm border" style="border-left: 5px solid #ff8ba7 !important;">
                    <div class="d-flex align-items-center">
                        <div id="detail-logo-container" class="me-3"></div>
                        <div>
                            <h2 class="h4 fw-bold mb-1" id="detail-title">插件指令详情</h2>
                            <p class="text-muted mb-0" id="detail-desc">暂无描述</p>
                        </div>
                    </div>
                    <div class="btn-group shadow-sm">
                        <button class="btn btn-outline-danger btn-sm" onclick="batchSet('admin')"><i class="fas fa-lock me-1"></i> 仅限管理员</button>
                        <button class="btn btn-outline-success btn-sm" onclick="batchSet('member')"><i class="fas fa-shield me-1"></i> 普通及以上</button>
                        <button class="btn btn-outline-secondary btn-sm" onclick="batchSet('everyone')"><i class="fas fa-globe me-1"></i> 所有人开放</button>
                    </div>
                </div>

                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover mb-0 align-middle">
                                <thead class="table-light">
                                    <tr>
                                        <th class="ps-4">指令名称 / 内部句柄</th>
                                        <th>指令权限设置</th>
                                        <th class="text-end pe-4">快速操作</th>
                                    </tr>
                                </thead>
                                <tbody id="commands-tbody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 改名模态框 -->
    <div class="modal fade" id="renameModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" style="border-radius: 20px; overflow: hidden; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                <div class="modal-header" style="background: linear-gradient(135deg, #ff8ba7, #c3a6ff); color: white;">
                    <h5 class="modal-title fw-bold"><i class="fas fa-pen-to-square me-2"></i> 修改指令名</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <label for="rename-input" class="form-label fw-bold">新的指令名称</label>
                    <input type="text" id="rename-input" class="form-control" style="border-radius: 12px; border: 2px solid #ffe3e8;" placeholder="输入新指令名">
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-primary w-100 py-2" id="save-rename-btn">保存改名</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 别名修改模态框 -->
    <div class="modal fade" id="aliasModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content" style="border-radius: 20px; overflow: hidden; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.1);">
                <div class="modal-header" style="background: linear-gradient(135deg, #ff8ba7, #c3a6ff); color: white;">
                    <h5 class="modal-title fw-bold"><i class="fas fa-tags me-2"></i> 修改别名</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="alias-badges" class="mb-3 d-flex flex-wrap gap-2"></div>
                    <div class="input-group">
                        <input type="text" id="new-alias-input" class="form-control" style="border-radius: 12px 0 0 12px; border: 2px solid #ffe3e8;" placeholder="输入新别名">
                        <button class="btn btn-primary" style="border-radius: 0 12px 12px 0;" onclick="addAlias()">添加</button>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button class="btn btn-primary w-100 py-2" onclick="saveAliases()">保存别名</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
        let allToolsData = [];

        window.switchTab = (tab) => {
            const commandsSearch = document.getElementById('commands-search-input-card');
            const searchResult = document.getElementById('command-search-card');
            const pluginsList = document.getElementById('plugins-list-card');
            const toolsCard = document.getElementById('tools-card');
            
            if (tab === 'commands') {
                if (commandsSearch) commandsSearch.style.display = 'block';
                // Only show search result card if it actually had elements visible before
                if (document.getElementById('search-commands-tbody').children.length > 0) {
                    if (searchResult) searchResult.style.display = 'block';
                }
                if (pluginsList) pluginsList.style.display = 'block';
                if (toolsCard) toolsCard.style.display = 'none';
                
                document.getElementById('tab-btn-commands').classList.add('active');
                document.getElementById('tab-btn-tools').classList.remove('active');
            } else {
                if (commandsSearch) commandsSearch.style.display = 'none';
                if (searchResult) searchResult.style.display = 'none';
                if (pluginsList) pluginsList.style.display = 'none';
                if (toolsCard) toolsCard.style.display = 'block';
                
                document.getElementById('tab-btn-commands').classList.remove('active');
                document.getElementById('tab-btn-tools').classList.add('active');
                
                if (allToolsData.length === 0) loadToolsData();
            }
        };

        async function loadToolsData() {
            try {
                const resp = await bridge.apiGet("tools/all");
                allToolsData = resp.success ? resp.data : (Array.isArray(resp) ? resp : resp.data) || [];
                renderTools(allToolsData);
            } catch (e) {
                document.getElementById('tools-tbody').innerHTML = `<tr><td colspan="3" class="text-center text-danger py-5">工具载入失败: ${e.message}</td></tr>`;
            }
        }

        function renderTools(tools) {
            const tbody = document.getElementById('tools-tbody');
            document.getElementById('tool-count-badge').textContent = `${tools.length} 个工具`;
            
            if (tools.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="text-center py-5 text-muted">未找到匹配的函数工具</td></tr>';
                return;
            }

            tbody.innerHTML = tools.map(t => `
                <tr>
                    <td class="ps-4">
                        <div class="fw-bold text-dark fs-6">${t.name}</div>
                        <div class="text-muted small mt-1" style="font-size: 0.85rem;">${t.desc || '无描述'}</div>
                    </td>
                    <td>
                        <span class="tool-type-badge badge-${t.type}">${t.type === 'builtin' ? '内置系统' : (t.type === 'mcp' ? '外部协议' : '插件工具')}</span>
                    </td>
                    <td class="text-end pe-4">
                        <div class="form-check form-switch d-inline-block">
                            <input class="form-check-input" type="checkbox" ${t.active ? 'checked' : ''} onchange="setToolActive('${t.name}', this.checked)" style="cursor: pointer; width: 40px; height: 20px;">
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        window.setToolActive = async (name, active) => {
            try {
                const res = await bridge.apiPost(`tools/${encodeURIComponent(name)}/set-active`, { active });
                if (res.success) {
                    const found = allToolsData.find(t => t.name === name);
                    if (found) found.active = active;
                } else {
                    alert('操作失败: ' + res.message);
                }
            } catch (e) {
                alert('请求出错: ' + e.message);
            }
        };

        window.filterTools = () => {
            const term = document.getElementById('tool-search').value.trim().toLowerCase();
            const filtered = allToolsData.filter(t => 
                t.name.toLowerCase().includes(term) || 
                (t.desc && t.desc.toLowerCase().includes(term))
            );
            renderTools(filtered);
        };

        window.clearToolSearch = () => {
            document.getElementById('tool-search').value = '';
            renderTools(allToolsData);
        };

        const bridge = window.AstrBotPluginPage;
        let currentPlugin = '';
        let currentHandler = '';
        let currentRenameHandler = '';
        let currentAliases = [];
        
        let pluginsData = [];
        let allCommandsData = [];

        async function init() {
            await bridge.ready();
            loadAllData();
        }

        async function loadAllData() {
            try {
                const [pluginsResp, allCmdsResp] = await Promise.all([
                    bridge.apiGet("plugins"),
                    bridge.apiGet("commands/all")
                ]);

                pluginsData = pluginsResp.success ? pluginsResp.data : (Array.isArray(pluginsResp) ? pluginsResp : pluginsResp.data) || [];
                allCommandsData = allCmdsResp.success ? allCmdsResp.data : (Array.isArray(allCmdsResp) ? allCmdsResp : allCmdsResp.data) || [];

                document.getElementById('plugin-count-badge').textContent = `${pluginsData.length} 个插件`;
                renderPlugins(pluginsData);
            } catch (e) {
                document.getElementById('plugins-tbody').innerHTML = `<tr><td colspan="4" class="text-center text-danger py-5">工盘数据载入失败: ${e.message}</td></tr>`;
            }
        }

        function renderPlugins(plugins) {
            const tbody = document.getElementById('plugins-tbody');
            if (plugins.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted py-5">没有找到匹配的插件哟</td></tr>`;
                return;
            }
            tbody.innerHTML = plugins.map(p => {
                const logoHtml = p.logo
                    ? `<img src="${p.logo}" class="plugin-logo" onerror="this.outerHTML='<div class=\'logo-placeholder\'>${p.display_name[0].toUpperCase()}</div>'">`
                    : `<div class="logo-placeholder">${p.display_name[0].toUpperCase()}</div>`;
                
                return `
                    <tr class="plugin-card">
                        <td class="ps-4">${logoHtml}</td>
                        <td>
                            <div class="fw-bold fs-6 text-dark" style="color: #2b3e50 !important;">${p.display_name}</div>
                            <div class="text-muted small" style="max-width: 500px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${p.desc}</div>
                            <div class="text-muted small mt-1" style="font-size: 0.75rem;"><i class="far fa-user me-1"></i>${p.author} | <i class="fas fa-code-branch me-1"></i>v${p.version}</div>
                        </td>
                        <td>
                            <span class="badge badge-cmd">${p.command_count} CMD</span>
                            ${p.group_count > 0 ? `<span class="badge badge-grp">${p.group_count} GRP</span>` : ''}
                        </td>
                        <td class="text-end pe-4">
                            <button class="btn btn-primary btn-sm px-3 shadow-sm rounded-pill" onclick="showDetail('${p.name}')"><i class="fas fa-gears me-1"></i> 管理权限</button>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        window.showDetail = async (name) => {
            currentPlugin = name;
            document.getElementById('view-list').style.display = 'none';
            document.getElementById('view-detail').style.display = 'block';
            
            const meta = pluginsData.find(p => p.name === name) || { display_name: name, desc: "暂无描述", has_logo: false };
            document.getElementById('breadcrumb-plugin-name').textContent = meta.display_name;
            document.getElementById('detail-title').textContent = meta.display_name;
            document.getElementById('detail-desc').textContent = meta.desc;

            const logoContainer = document.getElementById('detail-logo-container');
            logoContainer.innerHTML = meta.logo
                ? `<img src="${meta.logo}" class="plugin-logo" style="width: 50px; height: 50px;" onerror="this.outerHTML='<div class=\'logo-placeholder\' style=\'width: 50px; height: 50px; font-size: 1.5rem;\'>${meta.display_name[0].toUpperCase()}</div>'">`
                : `<div class="logo-placeholder" style="width: 50px; height: 50px; font-size: 1.5rem;">${meta.display_name[0].toUpperCase()}</div>`;

            const tbody = document.getElementById('commands-tbody');
            tbody.innerHTML = '<tr><td colspan="3" class="text-center py-5"><div class="spinner-border text-primary" role="status"></div></td></tr>';

            try {
                const resp = await bridge.apiGet(`plugin/${encodeURIComponent(name)}/commands`);
                let data = (resp && resp.success) ? resp.data : resp;
                if (!data || !data.commands) throw new Error("数据格式错误");

                const all = [...(data.commands || []), ...(data.groups || [])];
                renderCommandsTable(all, tbody);
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center text-danger py-5">插件详情载入失败: ${e.message}</td></tr>`;
            }
        };

        function toAttrJson(value) {
            return JSON.stringify(value)
                .replace(/&/g, '&amp;')
                .replace(/"/g, '&quot;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
        }

        function escapeHtml(value) {
            return String(value ?? '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function renderCommandsTable(commandsList, tbody) {
            tbody.innerHTML = commandsList.map((c, index) => {
                const aliases = Array.isArray(c.aliases) ? c.aliases : [];
                const aliasBadges = aliases.map(a => `<span class="badge bg-light text-dark border ms-1">${escapeHtml(a)}</span>`).join('');
                return `
                    <tr>
                        <td class="ps-4">
                            <div class="fw-bold text-dark fs-6">${c.name}</div>
                            <small class="text-muted d-block mt-1"><i class="fas fa-terminal me-1"></i>${c.handler}</small>
                            ${c.desc ? `<div class="text-muted small mt-1" style="font-size: 0.8rem;">${c.desc}</div>` : ''}
                            <div class="mt-2">${aliasBadges}</div>
                        </td>
                        <td>
                            <select class="form-select form-select-sm shadow-sm cmd-perm-select" data-handler="${toAttrJson(c.handler)}" style="width: 180px; border-radius: 10px;">
                                <option value="everyone" ${c.permission === 'everyone' ? 'selected' : ''}>🔑 所有人均可用</option>
                                <option value="member" ${c.permission === 'member' ? 'selected' : ''}>🔓 普通成员以上</option>
                                <option value="admin" ${c.permission === 'admin' ? 'selected' : ''}>🔒 仅限管理员</option>
                            </select>
                        </td>
                        <td class="text-end pe-4">
                            <button type="button" class="btn btn-sm btn-outline-secondary rounded-pill px-3 alias-btn" data-index="${index}"><i class="fas fa-tags me-1"></i> 别名</button>
                            <button type="button" class="btn btn-sm btn-outline-secondary rounded-pill px-3 ms-1 rename-btn" data-index="${index}"><i class="fas fa-pen-to-square me-1"></i> 改名</button>
                        </td>
                    </tr>
                `;
            }).join('');

            tbody.querySelectorAll('.cmd-perm-select').forEach(select => {
                select.addEventListener('change', () => setPerm(select.dataset.handler, select.value));
            });
            tbody.querySelectorAll('.alias-btn').forEach(button => {
                button.addEventListener('click', () => {
                    const cmd = commandsList[Number(button.dataset.index)];
                    openAliasModal(cmd.handler, cmd.aliases);
                });
            });
            tbody.querySelectorAll('.rename-btn').forEach(button => {
                button.addEventListener('click', () => {
                    const cmd = commandsList[Number(button.dataset.index)];
                    openRenameModal(cmd.handler, cmd.name);
                });
            });
        }

        window.showListView = () => {
            document.getElementById('view-list').style.display = 'block';
            document.getElementById('view-detail').style.display = 'none';
            loadAllData();
        };

        window.setPerm = async (handler, val) => {
            await bridge.apiPost(`command/${encodeURIComponent(currentPlugin)}/${encodeURIComponent(handler)}/set-permission`, { permission: val });
        };

        window.batchSet = async (val) => {
            await bridge.apiPost(`plugin/${encodeURIComponent(currentPlugin)}/set-permission`, { permission: val });
            showDetail(currentPlugin);
        };

        window.openRenameModal = (handler, old) => {
            currentRenameHandler = handler;
            const input = document.getElementById('rename-input');
            input.value = old || '';
            new bootstrap.Modal(document.getElementById('renameModal')).show();
            setTimeout(() => input.focus(), 200);
        };

        document.getElementById('save-rename-btn').addEventListener('click', async () => {
            const n = document.getElementById('rename-input').value.trim();
            if(n && currentRenameHandler) {
                await bridge.apiPost(`command/${encodeURIComponent(currentPlugin)}/${encodeURIComponent(currentRenameHandler)}/set-name`, { name: n });
                bootstrap.Modal.getInstance(document.getElementById('renameModal')).hide();
                showDetail(currentPlugin);
            }
        });

        window.renameCmd = window.openRenameModal;

        window.openAliasModal = (handler, aliases) => {
            currentHandler = handler;
            currentAliases = Array.isArray(aliases) ? [...aliases] : [];
            renderAliasBadges();
            new bootstrap.Modal(document.getElementById('aliasModal')).show();
        };

        window.addAlias = () => {
            const val = document.getElementById('new-alias-input').value.trim();
            if(val && !currentAliases.includes(val)) {
                currentAliases.push(val);
                document.getElementById('new-alias-input').value = '';
                renderAliasBadges();
            }
        };

        window.saveAliases = async () => {
            const resp = await bridge.apiPost(`command/${encodeURIComponent(currentPlugin)}/${encodeURIComponent(currentHandler)}/set-aliases`, { aliases: currentAliases });
            if (resp && resp.success === false) {
                alert('保存别名失败: ' + (resp.message || '未知错误'));
                return;
            }
            bootstrap.Modal.getInstance(document.getElementById('aliasModal')).hide();
            showDetail(currentPlugin);
        };

        function renderAliasBadges() {
            const container = document.getElementById('alias-badges');
            container.innerHTML = currentAliases.map((a, i) => `
                <span class="badge bg-secondary p-2 d-inline-flex align-items-center gap-1" style="background-color: #ff8ba7 !important; border-radius: 8px;">${escapeHtml(a)} <i class="fas fa-times alias-remove-btn" style="cursor:pointer" data-index="${i}"></i></span>
            `).join('');

            container.querySelectorAll('.alias-remove-btn').forEach(button => {
                button.addEventListener('click', () => {
                    currentAliases.splice(Number(button.dataset.index), 1);
                    renderAliasBadges();
                });
            });
        }

        // 🌟 跨插件全局搜索核心机制
        document.getElementById('global-search').addEventListener('input', (e) => {
            const term = e.target.value.trim().toLowerCase();
            if (!term) {
                clearSearch();
                return;
            }

            // 1. 过滤插件
            const filteredPlugins = pluginsData.filter(p => 
                p.name.toLowerCase().includes(term) || 
                p.display_name.toLowerCase().includes(term) || 
                p.desc.toLowerCase().includes(term)
            );
            renderPlugins(filteredPlugins);

            // 2. 全局搜索指令
            const filteredCommands = allCommandsData.filter(c => 
                c.name.toLowerCase().includes(term) || 
                c.original_name.toLowerCase().includes(term) || 
                c.handler.toLowerCase().includes(term) || 
                c.desc.toLowerCase().includes(term) || 
                (Array.isArray(c.aliases) ? c.aliases : []).some(a => a.toLowerCase().includes(term))
            );

            const searchCard = document.getElementById('command-search-card');
            const searchTbody = document.getElementById('search-commands-tbody');
            const countBadge = document.getElementById('search-count-badge');

            if (filteredCommands.length > 0) {
                searchCard.style.display = 'block';
                countBadge.textContent = `${filteredCommands.length} 个指令`;
                searchTbody.innerHTML = filteredCommands.map(c => `
                    <tr>
                        <td class="ps-4">
                            <div class="fw-bold text-dark fs-6">${c.name}</div>
                            <small class="text-muted"><i class="fas fa-terminal me-1"></i>${c.handler}</small>
                            <span class="badge rounded-pill ms-2" style="background-color:#c3a6ff; color:#fff;">${c.plugin_display_name}</span>
                            ${c.desc ? `<div class="text-muted small mt-1" style="font-size: 0.8rem;">${c.desc}</div>` : ''}
                            <div class="mt-2">${(Array.isArray(c.aliases) ? c.aliases : []).map(a => `<span class="badge bg-light text-dark border ms-1">${escapeHtml(a)}</span>`).join('')}</div>
                        </td>
                        <td>
                            <select class="form-select form-select-sm shadow-sm" onchange="setGlobalPerm('${c.plugin_name}', '${c.handler}', this.value)" style="width: 180px; border-radius: 10px;">
                                <option value="everyone" ${c.permission === 'everyone' ? 'selected' : ''}>🔑 所有人均可用</option>
                                <option value="member" ${c.permission === 'member' ? 'selected' : ''}>🔓 普通成员以上</option>
                                <option value="admin" ${c.permission === 'admin' ? 'selected' : ''}>🔒 仅限管理员</option>
                            </select>
                        </td>
                        <td class="text-end pe-4">
                            <button class="btn btn-sm btn-outline-primary rounded-pill px-3" onclick="jumpToPlugin('${c.plugin_name}')"><i class="fas fa-external-link-alt me-1"></i> 跳转到所属插件</button>
                        </td>
                    </tr>
                `).join('');
            } else {
                searchCard.style.display = 'none';
            }
        });

        window.setGlobalPerm = async (pluginName, handler, val) => {
            await bridge.apiPost(`command/${encodeURIComponent(pluginName)}/${encodeURIComponent(handler)}/set-permission`, { permission: val });
            const found = allCommandsData.find(c => c.plugin_name === pluginName && c.handler === handler);
            if (found) found.permission = val;
        };

        window.jumpToPlugin = (pluginName) => {
            showDetail(pluginName);
        };

        window.clearSearch = () => {
            document.getElementById('global-search').value = '';
            document.getElementById('command-search-card').style.display = 'none';
            renderPlugins(pluginsData);
        };

        init();
    </script>
  </body>
</html>
